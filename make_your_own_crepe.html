<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make Your Own Crepe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <img src="images/Logo.png" alt="Logo" class="navbar-logo">
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav">
        <li class="nav-item"><a id="nav-home" class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a id="nav-make_your_own_crepe" class="nav-link" href="make_your_own_crepe.html">Make your own crepe</a></li>
        <li class="nav-item"><a id="nav-gallery" class="nav-link" href="#">Gallery</a></li>
        <li class="nav-item"><a id="nav-contact" class="nav-link" href="contact_us.html">Contact Us</a></li>
      </ul>
    </div>
    <div class="d-flex">
      <button class="btn btn-light me-2 lang-btn" id="btn-en">
        <img src="images/flag_us.jpg" class="flag-icon">EN
      </button>
      <button class="btn btn-light lang-btn" id="btn-th">
        <img src="images/th_flag.jpg" class="flag-icon">TH
      </button>
    </div>
  </div>
</nav>

<div class="container text-center">
  <h1 id="title">Create Your Own Crepe</h1>
  <div id="main-content" style="display: none;">
    <!-- Ingredient selection section -->
    <div id="ingredient-selection">
      <div class="row justify-content-center mb-4">
        <div class="col-md-4">
          <button class="btn btn-primary choose-btn" data-type="sauce">Choose Sauce</button>
          <p id="selected-sauce" class="mt-2">None</p>
        </div>
        <div class="col-md-4">
          <button class="btn btn-primary choose-btn" data-type="filling">Choose Filling</button>
          <p id="selected-filling" class="mt-2">None</p>
        </div>
        <div class="col-md-4">
          <button class="btn btn-primary choose-btn" data-type="topping">Choose Topping</button>
          <p id="selected-topping" class="mt-2">None</p>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-6">
          <button id="make-crepe" class="btn btn-success">Make a Crepe</button>
          <p id="error-message" class="mt-2"></p>
        </div>
      </div>

      <div class="row justify-content-center mt-4">
        <div class="col-md-8">
          <img id="result-img" class="img-fluid" style="display: none;">
          <button id="hide-photo" class="btn btn-secondary mt-3" style="display: none;">Hide Photo</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
