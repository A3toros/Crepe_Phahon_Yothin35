<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crepe Customization</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <img src="images/Logo.png" alt="Logo" class="navbar-logo">
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav">
        <li class="nav-item"><a id="nav-home" class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a id="nav-make_your_own_crepe" class="nav-link" href="make_your_own_crepe.html">Make your own crepe</a></li>
        <li class="nav-item"><a id="nav-gallery" class="nav-link" href="#">Gallery</a></li>
        <li class="nav-item"><a id="nav-contact" class="nav-link" href="contact_us.html">Contact Us</a></li>
      </ul>
    </div>
    <div class="d-flex">
      <button class="btn btn-light me-2 lang-btn" id="btn-en">
        <img src="images/flag_us.jpg" class="flag-icon">EN
      </button>
      <button class="btn btn-light lang-btn" id="btn-th">
        <img src="images/th_flag.jpg" class="flag-icon">TH
      </button>
    </div>
  </div>
</nav>
<div class="banner">
    <img src="images/banner.jpg" alt="Banner">
</div>
<div class="container crepe-table">
    <h2 id="title">Create Your Own Crepe</h2>
    <table class="table">
      <tr>
        <th id="sauce-title"></th>
        <th id="filling-title"></th>
        <th id="topping-title"></th>
      </tr>
      <tr>
        <td>
          <button class="btn btn-primary choose-btn" id="choose-sauce-btn" data-type="sauce">
            Choose Your Sauce
          </button>
        </td>
        <td>
          <button class="btn btn-primary choose-btn" id="choose-filling-btn" data-type="filling">
            Choose Your Filling
          </button>
        </td>
        <td>
          <button class="btn btn-primary choose-btn" id="choose-topping-btn" data-type="topping">
            Choose Your Topping
          </button>
        </td>
      </tr>
      <tr>
        <td><p id="selected-sauce">Sauce: None</p></td>
        <td><p id="selected-filling">Filling: None</p></td>
        <td><p id="selected-topping">Topping: None</p></td>
      </tr>
    </table>
  </div>
  
  <!-- Image Display -->
  <div class="container">
    <div id="crepe-image" class="text-center">
      <img id="result-img" src="" alt="Your custom crepe">
      <br>
      <button id="make-crepe" class="btn btn-info mt-2">Make a Crepe</button>
      <p id="error-message"></p>
      <br>
      <button id="hide-photo" class="btn btn-danger mt-2" style="display: none;">Hide Photo</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
